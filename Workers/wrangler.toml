name = "aitranslator"
main = "azureProxyWorker.ts"
compatibility_date = "2024-01-01"

# Custom domain (requires DNS configured in Cloudflare)
routes = [
  { pattern = "translator-api.zanderwang.com/*", zone_name = "zanderwang.com" },
  { pattern = "tlingo.zanderwang.com/api/*", zone_name = "zanderwang.com" }
]

# Default workers.dev subdomain: https://aitranslator.xiaozwan.workers.dev/

# Smart Placement: run Worker close to Azure backend (US East) instead of
# close to the end user, reducing Worker→Azure round-trip latency.
[placement]
mode = "smart"

# Enable observability (logs and tracing)
[observability]
enabled = true

[vars]
STRIPE_MONTHLY_PRICE_ID = "price_1TTDhULR1JKu36LYjURBZxPE"
STRIPE_YEARLY_PRICE_ID = "price_1TTDhVLR1JKu36LYhfqSBpph"
STRIPE_LIFETIME_PRICE_ID = "price_1TTDhWLR1JKu36LY35u9BpkL"
CHECKOUT_SUCCESS_URL = "https://tlingo.zanderwang.com/?checkout=success"
CHECKOUT_CANCEL_URL = "https://tlingo.zanderwang.com/?checkout=cancelled"
BILLING_PORTAL_RETURN_URL = "https://tlingo.zanderwang.com/"

# Environment variables (secrets should be set via `wrangler secret put`)
# Required secrets:
# - APP_SECRET: The HMAC shared secret for request signing
# - AZURE_API_KEY: Azure OpenAI API key
# - AZURE_ENDPOINT: Azure OpenAI endpoint URL
# - STRIPE_SECRET_KEY: Stripe secret key for creating Checkout Sessions
# - STRIPE_WEBHOOK_SECRET: Stripe webhook endpoint signing secret
# - SUPABASE_URL: Supabase project URL
# - SUPABASE_ANON_KEY: Supabase publishable/anon key for Auth validation
# - SUPABASE_SERVICE_ROLE_KEY: Supabase service role key for billing_entitlements writes

# D1 Database for marketplace actions
[[d1_databases]]
binding = "MARKETPLACE_DB"
database_name = "aitranslator-marketplace"
database_id = "7f192cb7-8165-43e5-9ac6-035c7bf194e7"
migrations_dir = "migrations"

# ---- Dev environment ----
# Deployed as: https://aitranslator-dev.xiaozwan.workers.dev/
# Deploy with:  npx wrangler deploy --env dev
# Set secrets:  npx wrangler secret put APP_SECRET --env dev
#               npx wrangler secret put AZURE_API_KEY --env dev
#               npx wrangler secret put AZURE_ENDPOINT --env dev
[env.dev]
name = "aitranslator-dev"
routes = []
